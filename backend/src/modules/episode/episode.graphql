type CreditsResponse {
  id: Int
  cast: [CastMember]
  crew: [CrewMemberData]
  guest_stars: [GuestStar]
}

type getSeasonTranslationsResponse {
  id: Int
  translations: [TranslationDetails]
}
type Query {
  episodeDetails(seriesId: Int!, seasonNumber: Int!, episodeNumber: Int!): EpisodeDetails
  episodeCredits(seriesId: Int!, seasonNumber: Int!, episodeNumber: Int!):  creditsResponse
  episodeExternalIds(seriesId: Int!, seasonNumber: Int!, episodeNumber: Int!): externalID
  episodeImages(seriesId: Int!, seasonNumber: Int!, episodeNumber: Int!): getImagesResponse
  episodeVideos(seriesId: Int!, seasonNumber: Int!, episodeNumber: Int!): getVideosResponse
  episodeTranslations(seriesId: Int!, seasonNumber: Int!, episodeNumber: Int!): getSeasonTranslationsResponse
}